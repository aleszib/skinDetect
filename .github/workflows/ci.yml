name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python tests and lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect Python project files
        id: detect-python-project
        run: |
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python with pip cache
        if: steps.detect-python-project.outputs.present == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Python
        if: steps.detect-python-project.outputs.present != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package with dev dependencies
        if: steps.detect-python-project.outputs.present == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        if: steps.detect-python-project.outputs.present == 'true'
        run: |
          ruff check .

      - name: Run tests
        if: steps.detect-python-project.outputs.present == 'true'
        run: |
          pytest

      - name: Skip Python validation when project files are absent
        if: steps.detect-python-project.outputs.present != 'true'
        run: |
          echo "No pyproject.toml or setup.py found, skipping Python lint and tests."
